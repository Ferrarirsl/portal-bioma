<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Gerar QR — Portal Bioma</title>
<style>body{font-family:'Segoe UI',Arial,sans-serif;background:#0d3b66;color:#fff;display:flex;min-height:100vh;
align-items:center;justify-content:center;margin:0;padding:24px}.box{background:#fff;color:#1a2230;border-radius:16px;
padding:26px;max-width:390px;width:100%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.4)}
h2{margin:0 0 4px}p{font-size:13px;color:#555;margin:6px 0 14px}
input{width:100%;padding:11px;border:1px solid #ccc;border-radius:9px;font-size:14px;margin-bottom:12px}
button{background:#0d3b66;color:#fff;border:0;border-radius:9px;padding:12px 18px;font-weight:700;cursor:pointer;font-size:14px}
img{margin-top:18px;max-width:100%;border-radius:10px;border:1px solid #eee}
a{display:inline-block;margin-top:10px;color:#0d3b66;font-size:13px;font-weight:700}</style></head>
<body><div class="box"><h2>QR do Portal Bioma</h2>
<p>Cole a URL publicada e gere o QR Code para o cliente escanear. (Requer internet.)</p>
<input id="u" placeholder="https://seuusuario.github.io/portal-bioma/">
<button onclick="g()">Gerar QR Code</button>
<div id="out"></div></div>
<script>function g(){var u=document.getElementById('u').value.trim();if(!u){return;}
var s='https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=12&data='+encodeURIComponent(u);
document.getElementById('out').innerHTML='<img src="'+s+'" alt="QR Code"><br><a href="'+s+'" download="qr-portal-bioma.png">Baixar QR (PNG)</a>';}</script>
</body></html>
